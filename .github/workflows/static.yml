# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ hashFiles('content/**/*.md', 'hugo.toml', 'themes/**/*', 'cli/src/fetch-deps.ts', 'cli/src/build.ts', 'bun.lock', 'package.json') }}

      - name: Cache bun output
        id: cache-bun
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ hashFiles('package.json', 'bun.lock') }}

      - name: Cache deps bin
        id: cache-bin
        uses: actions/cache@v4
        with:
          path: bin
          key: bin-${{ hashFiles('cli/src/fetch-deps.ts') }}

      - name: Check if all caches hit
        id: check-caches
        run: |
          if [ "${{ steps.cache-build.outputs.cache-hit }}" == "true" ] && [ "${{ steps.cache-bun.outputs.cache-hit }}" == "true" ] && [ "${{ steps.cache-bin.outputs.cache-hit }}" == "true" ]; then
            echo "All caches hit, skipping deployment"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "echo=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        if: steps.check-caches.outputs.skip != 'true'

      - name: Install dependencies
        run: bun install
        if: steps.cache-bun.outputs.cache-hit != 'true' && steps.check-caches.outputs.skip != 'true'

      - name: Fetch deps (Hugo + theme)
        run: bun run fetch-deps
        if: steps.cache-bin.outputs.cache-hit != 'true' && steps.check-caches.outputs.skip != 'true'

      - name: Build static site
        run: HUGO_BASEURL=/sgtwiki/ bun run --cwd cli build
        if: steps.check-caches.outputs.skip != 'true'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "build"
        if: steps.check-caches.outputs.skip != 'true'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        if: steps.check-caches.outputs.skip != 'true'
